  <!-- Structured data for search engines -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "The Interactive Periodic Table",
    "url": "https://alastairrushworth.com/elements/",
    "description": "A free, interactive periodic table of all 118 elements with an animated atom model, real crystal lattices, and a hands-on melt-it-down temperature lab.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any (modern web browser)",
    "browserRequirements": "Requires JavaScript.",
    "inLanguage": "en",
    "isAccessibleForFree": true,
    "image": "https://alastairrushworth.com/elements/og-image.png",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Person", "name": "Alastair Rushworth", "url": "https://alastairrushworth.com" }
  }

<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>The Interactive Periodic Table</h1>
    </div>
    <div id="legend" class="legend" aria-label="Filter by category"></div>
  </header>

  <main>
    <noscript>
      <p style="max-width:42rem;margin:1.5rem auto;padding:0 1rem;text-align:center;color:#aab8cf">
        This interactive periodic table needs JavaScript to explore all 118
        elements — their animated atom models, crystal lattices and the
        melt-it-down lab. Please enable JavaScript to use it.
      </p>
    </noscript>
    <div class="table-scroll">
      <div id="table" class="periodic-table" role="grid" aria-label="Periodic table of the elements"></div>
    </div>
  </main>

  <!-- Detail overlay -->
  <div id="overlay" class="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m-name">
      <button id="close-btn" class="close-btn" aria-label="Close">&times;</button>
      <div class="modal-grid">
        <!-- Left: identity + atom -->
        <section class="modal-left">
          <div class="id-card">
            <div class="id-top">
              <span class="id-number" id="m-number"></span>
              <span class="id-mass" id="m-mass"></span>
            </div>
            <div class="id-symbol" id="m-symbol"></div>
            <div class="id-name" id="m-name"></div>
            <div class="id-cat" id="m-cat"></div>
          </div>
          <div class="atom-stage">
            <svg id="atom" viewBox="-160 -160 320 320" aria-label="Animated atom model"></svg>
            <div class="atom-caption" id="m-config"></div>
          </div>

          <div class="natural-form" id="m-natural">
            <div class="nf-head">How it occurs in nature</div>
            <div class="nf-text" id="nf-text"></div>
            <svg id="molecule" viewBox="-100 -100 200 200" aria-label="Structure of the most common natural form"></svg>
            <div class="nf-formula" id="nf-formula"></div>
          </div>
        </section>

        <!-- Right: facts + interactive -->
        <section class="modal-right">
          <p class="fun-fact" id="m-fact"></p>

          <div class="extra-facts" id="m-extra"></div>

          <div class="props" id="m-props"></div>

          <div class="meltdown" id="meltdown">
            <div class="meltdown-head">
              <h3>Melt it down <span class="hint">drag the temperature</span></h3>
              <div class="state-badge" id="state-badge">
                <span class="state-icon" id="state-icon"></span>
                <span class="state-label" id="state-label"></span>
              </div>
            </div>
            <div class="beaker" id="beaker">
              <div class="particles" id="particles"></div>
              <div class="phase-line melt-line" id="melt-line"><span></span></div>
              <div class="phase-line boil-line" id="boil-line"><span></span></div>
            </div>
            <div class="lattice-caption" id="lattice-caption"></div>
            <input type="range" id="temp-slider" min="0" max="6000" value="298" step="1" />
            <div class="temp-readout">
              <span id="temp-value">298 K</span>
              <span class="temp-sub" id="temp-sub"></span>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <span id="discovery-note"></span>
    <span class="muted">Built as an interactive learning toy &middot; data for all 118 elements</span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/details.js"></script>
  <script src="js/crystals.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
